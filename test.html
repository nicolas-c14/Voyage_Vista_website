<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fond mouvant fluide</title>
<style>
    /* Réinitialisation basique */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        height: 100vh;
        overflow: hidden;
    }

    /* Fond animé */
    .background {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url('assets/images/banniere.jpg'); /* Remplacez par votre image */
        background-size: cover; /* L'image couvre tout l'écran */
        background-repeat: repeat-x; /* Répétition horizontale */
        animation: moveBackground 30s linear infinite; /* Animation fluide */
    }

    /* Animation du défilement */
    @keyframes moveBackground {
        from {
            background-position: 0 0;
        }
        to {
            background-position: -2000px 0; /* Ajustez selon la largeur de l'image */
        }
    }

    /* Contenu par-dessus */
    .content {
        position: relative;
        z-index: 1;
        color: white;
        text-align: center;
        top: 50%;
        transform: translateY(-50%);
        font-family: Arial, sans-serif;
    }
</style>
</head>
<body>

<!-- <div class="background"></div>
<div class="content">
    <h1>Fond mouvant fluide</h1>
    <p>Exemple d'image de fond animée en CSS</p>
</div> -->

<form id="registerForm">
  <input type="password" id="password" placeholder="Mot de passe" required>
  <input type="password" id="confirmPassword" placeholder="Confirmer le mot de passe" required>
  <button type="submit">S'inscrire</button>
</form> 

<script>
document.addEventListener("DOMContentLoaded", function() {

    document.getElementById("registerForm").addEventListener("submit", function(event) {
        if (!validatePassword()) {
            event.preventDefault(); // Empêche l'envoi
        } 
    });   

});

function validateMDPCarac(mdp){
    // Au moins 8 caractères, 1 maj, 1 min, 1 chiffre, 1 caractère spécial
    var Reg = /^(?=.*?[A-Z])(?=.*?[a-z])(?=.*?[0-9])(?=.*?[#?!@$%^&*-]).{8,}$/;
    return Reg.test(mdp);
}

function validatePassword() {
    const passwordInput = document.getElementById("password");
    const confirmPasswordInput = document.getElementById("confirmPassword");

    // Réinitialiser les messages d'erreur
    passwordInput.setCustomValidity("");
    confirmPasswordInput.setCustomValidity("");

    if (!validateMDPCarac(passwordInput.value)) {
        passwordInput.setCustomValidity(
            "Le mot de passe doit comporter au moins 8 caractères, une majuscule, une minuscule, un chiffre et un caractère spécial."
        );
        passwordInput.reportValidity(); // Affiche la bulle d'erreur
        return false;
    }
    else if (passwordInput.value !== confirmPasswordInput.value) {
        confirmPasswordInput.setCustomValidity("Les mots de passe ne correspondent pas.");
        confirmPasswordInput.reportValidity();
        return false;
    }
    return true;
}
</script>


</body>
</html>
