<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fond mouvant fluide</title>
<style>
    /* Réinitialisation basique */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        height: 100vh;
        overflow: hidden;
    }

    /* Fond animé */
    .background {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url('assets/images/banniere.jpg'); /* Remplacez par votre image */
        background-size: cover; /* L'image couvre tout l'écran */
        background-repeat: repeat-x; /* Répétition horizontale */
        animation: moveBackground 30s linear infinite; /* Animation fluide */
    }

    /* Animation du défilement */
    @keyframes moveBackground {
        from {
            background-position: 0 0;
        }
        to {
            background-position: -2000px 0; /* Ajustez selon la largeur de l'image */
        }
    }

    /* Contenu par-dessus */
    .content {
        position: relative;
        z-index: 1;
        color: white;
        text-align: center;
        top: 50%;
        transform: translateY(-50%);
        font-family: Arial, sans-serif;
    }
</style>
</head>
<body>

<div class="background"></div>

<div class="content">
    <h1>Fond mouvant fluide</h1>
    <p>Exemple d'image de fond animée en CSS</p>
</div>

</body>
</html>
